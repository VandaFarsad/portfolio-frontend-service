services:
  portfolio-frontend-service:
    container_name: portfolio-frontend-service
    build:
      context: ./
      target: deps
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
    command: pnpm run dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - portfolio-network

networks:
  portfolio-network:
    external: true