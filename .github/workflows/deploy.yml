name: CI/CD to Hetzner

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm ts:ci

  deploy-staging:
    name: Deploy to Staging
    needs: type-check
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc.')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Staging via SSH
        uses: appleboy/ssh-action@v1
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: TAG_NAME
          script: |
            set -e
            cd /root/portfolio/portfolio-frontend-service
            git fetch --all --tags
            git checkout "$TAG_NAME"
            docker build --network=host -t portfolio-frontend-service-staging .
            docker rm -f portfolio-frontend-staging || true
            docker run -d \
              --name portfolio-frontend-staging \
              --env-file .env.staging \
              -p 8082:8080 \
              --network nginx_app-network \
              --restart unless-stopped \
              portfolio-frontend-service-staging

  deploy-production:
    name: Deploy to Production
    needs: type-check
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc.')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Production via SSH
        uses: appleboy/ssh-action@v1
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: TAG_NAME
          script: |
            set -e
            cd /root/portfolio/portfolio-frontend-service
            git fetch --all --tags
            git checkout "$TAG_NAME"
            docker build --network=host -t portfolio-frontend-service .
            docker rm -f portfolio-frontend || true
            docker run -d \
              --name portfolio-frontend \
              --env-file .env.local \
              -p 8080:8080 \
              --network nginx_app-network \
              --restart unless-stopped \
              portfolio-frontend-service